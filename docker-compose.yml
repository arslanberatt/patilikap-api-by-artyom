services:
  # ─── API ────────────────────────────────────────────────────────────────────
  # SSL + routing Dokploy/Traefik tarafından yönetilir.
  # Domain ve cert ayarı Dokploy panelinden yapılır; nginx/certbot servisleri
  # gereksiz (port çakışması yapıyordu).
  api:
    build: .
    container_name: patilikap-api-by-artyom
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "3001:3001"   # Dokploy/Traefik bu porta proxy yapar
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - patilikap-network
    volumes:
      - ./prisma:/app/prisma  # migration'lar için

  # ─── POSTGRESQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: patilikap-db-by-artyom
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patilikap}
      POSTGRES_USER: ${POSTGRES_USER:-patilikap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - patilikap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patilikap}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local

networks:
  patilikap-network:
    driver: bridge
