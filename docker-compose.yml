services:
  # ─── API ────────────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: patilikap-api-by-artyom
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - patilikap-network
    volumes:
      - ./prisma:/app/prisma  # migration'lar için

  # ─── POSTGRESQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: patilikap-db-by-artyom
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-patilikap}
      POSTGRES_USER: ${POSTGRES_USER:-patilikap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - patilikap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-patilikap}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NGINX ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: patilikap-nginx-by-artyom
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # SSL sertifikaları
      - certbot-webroot:/var/www/certbot:ro    # Let's Encrypt doğrulama
    depends_on:
      - api
    networks:
      - patilikap-network

  # ─── CERTBOT (SSL) ──────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: patilikap-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Manuel çalıştırılır: docker compose run certbot certonly ...
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
    driver: local
  certbot-webroot:
    driver: local

networks:
  patilikap-network:
    driver: bridge