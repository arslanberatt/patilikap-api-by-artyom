worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ─── TEMEL AYARLAR ──────────────────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 110M;  # upload için (video max 100MB)

  # Gzip sıkıştırma
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain application/json application/javascript text/css;

  # Güvenlik — versiyon gizle
  server_tokens off;

  # ─── RATE LIMITING ──────────────────────────────────────────────────────────
  # Değerler backend middleware ile eşleştirildi (src/middleware/rateLimit.ts)
  limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;   # generalLimiter: 60/dk
  limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/m;   # authLimiter: 10/dk
  limit_req_zone $binary_remote_addr zone=upload:10m rate=20r/m;   # uploadLimiter: 20/dk
  limit_req_zone $binary_remote_addr zone=paytr:10m  rate=10r/m;   # paytrLimiter: 10/dk

  # ─── HTTP → HTTPS YÖNLENDİRME ───────────────────────────────────────────────
  server {
    listen 80;
    server_name api.patilikap.com;

    # Let's Encrypt doğrulama
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── HTTPS ──────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name api.patilikap.com;

    # SSL sertifikaları (Let's Encrypt)
    ssl_certificate /etc/nginx/ssl/live/api.patilikap.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.patilikap.com/privkey.pem;

    # SSL güvenlik ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Güvenlik header'ları
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── AUTH ENDPOINT'LERİ — Sıkı rate limit ─────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── PAYTR WEBHOOK — Sadece resmi PayTR IP'leri (src/middleware/paytrWhitelist.ts) ─
    location /api/paytr/ {
      allow 193.192.58.140;
      allow 193.192.58.141;
      allow 193.192.58.142;
      allow 193.192.58.143;
      allow 193.192.58.144;
      allow 193.192.58.145;
      allow 193.192.58.146;
      allow 193.192.58.147;
      allow 193.192.58.148;
      allow 193.192.58.149;
      allow 193.192.58.150;
      allow 193.192.58.151;
      deny all;

      limit_req zone=paytr burst=5 nodelay;
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── UPLOAD — Yüksek timeout, ayrı rate limit ─────────────────────────────
    location /api/upload/ {
      limit_req zone=upload burst=5 nodelay;
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;    # büyük dosya yüklemeleri için
      proxy_connect_timeout 10s;
      proxy_send_timeout 120s;
    }

    # ─── GENEL API ────────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }

    # ─── HEALTH CHECK ─────────────────────────────────────────────────────────
    location /health {
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      access_log off;
    }

    # ─── SWAGGER DOCS — Sadece dev/staging ────────────────────────────────────
    # /docs ve /docs/json prefix match ile karşılanır
    location /docs {
      # Production'da kapat:
      # return 403;
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
    }

    # ─── ROOT ─────────────────────────────────────────────────────────────────
    location / {
      proxy_pass http://api:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
